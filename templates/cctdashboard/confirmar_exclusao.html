{% extends "cctdashboard/base.html" %}
{% block title %}Confirmar Exclusão - Mediador CCT{% endblock %}

{% block content %}
<div class="flex justify-center">
    <div class="w-full max-w-md">
        <div class="card shadow-sm border border-red-200">
            <div class="card-header bg-red-600 text-white font-bold flex items-center">
                <i class="bi bi-exclamation-triangle-fill mr-2"></i>Confirmar Exclusão
            </div>
            <div class="p-6 text-center">
                <p class="mb-2 text-slate-600">Tem certeza que deseja excluir?</p>
                <h5 class="mb-4 text-lg font-bold text-slate-800">{{ objeto }}</h5>
                <form method="post">
                    {% csrf_token %}
                    <div class="flex justify-center gap-2">
                        <button type="submit" class="btn bg-red-600 text-white hover:bg-red-700">
                            <i class="bi bi-trash-fill mr-1"></i>Sim, excluir
                        </button>
                        <a href="{% url voltar_url voltar_pk %}" class="btn bg-white text-slate-700 border border-slate-300 hover:bg-slate-50">
                            <i class="bi bi-x-lg mr-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
