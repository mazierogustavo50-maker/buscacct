{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mediador CCT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex items-center justify-center font-sans antialiased">
    <div class="w-full max-w-md mx-4">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
            <div class="bg-gradient-to-r from-blue-600 to-blue-800 text-white text-center p-8">
                <div class="w-16 h-16 bg-white/20 rounded-xl inline-flex items-center justify-center text-3xl mb-4 mx-auto">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h4 class="text-2xl font-bold mb-1">Mediador CCT</h4>
                <p class="text-white/75 text-sm">Acesso restrito ao sistema</p>
            </div>
            <div class="p-8">
                {% if form.errors %}
                    <div class="flex items-center gap-2 bg-red-50 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm" role="alert">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        <span>Usuário ou senha inválidos.</span>
                    </div>
                {% endif %}
                {% if next %}
                    {% if user.is_authenticated %}
                        <div class="bg-amber-50 text-amber-700 px-4 py-3 rounded-lg mb-4 text-sm">Você não tem permissão para acessar esta página.</div>
                    {% endif %}
                {% endif %}
                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="id_username" class="block text-sm font-medium text-slate-700 mb-1">
                            <i class="bi bi-person mr-1"></i>Usuário
                        </label>
                        <input type="text" name="username" id="id_username" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition" placeholder="Usuário" autocomplete="username" required autofocus>
                    </div>
                    <div class="mb-6">
                        <label for="id_password" class="block text-sm font-medium text-slate-700 mb-1">
                            <i class="bi bi-key mr-1"></i>Senha
                        </label>
                        <input type="password" name="password" id="id_password" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition" placeholder="Senha" autocomplete="current-password" required>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-800 text-white font-semibold py-3 rounded-lg hover:shadow-lg hover:-translate-y-0.5 transition flex items-center justify-center">
                        <i class="bi bi-box-arrow-in-right mr-2"></i>Entrar
                    </button>
                </form>
                <div class="text-center mt-4">
                    <a href="/admin/" class="text-sm text-slate-500 hover:text-blue-600 transition inline-flex items-center">
                        <i class="bi bi-shield-shaded mr-1"></i>Acesso Administrativo
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
