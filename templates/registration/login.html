{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mediador CCT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1e3a8a 0%, #172554 100%);
            --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
        }
        body {
            background: linear-gradient(135deg, #0b1120 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .login-card {
            background: #151e32;
            border-radius: 1.25rem;
            box-shadow: var(--card-shadow);
            border: 1px solid #2d3b55;
            overflow: hidden;
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            background: var(--primary-gradient);
            color: #fff;
            padding: 2.5rem 2rem 2rem;
            text-align: center;
        }
        .login-header .logo-icon {
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.15);
            border-radius: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .login-body {
            padding: 2rem;
        }
        .form-floating > .form-control {
            border-radius: 0.75rem;
            border: 1.5px solid #2d3b55;
            background-color: #0f172a;
            color: #e2e8f0;
        }
        .form-floating > .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
            background-color: #0f172a;
            color: #e2e8f0;
        }
        .form-floating > label {
            color: #94a3b8;
        }
        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            color: #94a3b8;
        }
        .btn-login {
            background: var(--primary-gradient);
            border: none;
            border-radius: 0.75rem;
            padding: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.025em;
            transition: all 0.2s;
            color: #fff;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59,130,246,0.3);
        }
        .alert {
            border-radius: 0.75rem;
            border: none;
        }
        .text-muted {
            color: #94a3b8 !important;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon"><i class="bi bi-shield-lock-fill"></i></div>
            <h4 class="fw-bold mb-1">Mediador CCT</h4>
            <p class="mb-0 opacity-75 small">Acesso restrito ao sistema</p>
        </div>
        <div class="login-body">
            {% if form.errors %}
                <div class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <div>Usuário ou senha inválidos.</div>
                </div>
            {% endif %}
            {% if next %}
                {% if user.is_authenticated %}
                    <div class="alert alert-warning">Você não tem permissão para acessar esta página.</div>
                {% endif %}
            {% endif %}
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-floating mb-3">
                    <input type="text" name="username" class="form-control" id="id_username" placeholder="Usuário" autocomplete="username" required autofocus>
                    <label for="id_username"><i class="bi bi-person me-1"></i>Usuário</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" name="password" class="form-control" id="id_password" placeholder="Senha" autocomplete="current-password" required>
                    <label for="id_password"><i class="bi bi-key me-1"></i>Senha</label>
                </div>
                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit" class="btn btn-primary btn-login w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
            </form>
            <div class="text-center mt-3">
                <a href="/admin/" class="text-decoration-none small text-muted">
                    <i class="bi bi-shield-shaded me-1"></i>Acesso Administrativo
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
