{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mediador CCT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon"><i class="bi bi-shield-lock-fill"></i></div>
            <h4 class="fw-bold mb-1">Mediador CCT</h4>
            <p class="mb-0 small opacity-75">Acesso restrito ao sistema</p>
        </div>
        <div class="login-body">
            {% if form.errors %}
                <div class="alert alert-danger d-flex align-items-center gap-2" role="alert">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <div>Usuário ou senha inválidos.</div>
                </div>
            {% endif %}
            {% if next %}
                {% if user.is_authenticated %}
                    <div class="alert alert-warning">Você não tem permissão para acessar esta página.</div>
                {% endif %}
            {% endif %}
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label"><i class="bi bi-person me-1"></i>Usuário</label>
                    <input type="text" name="username" class="form-control" id="id_username" placeholder="Digite seu usuário" autocomplete="username" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="id_password" class="form-label"><i class="bi bi-key me-1"></i>Senha</label>
                    <input type="password" name="password" class="form-control" id="id_password" placeholder="Digite sua senha" autocomplete="current-password" required>
                </div>
                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
            </form>
            <div class="text-center mt-4">
                <a href="/admin/" class="small text-muted text-decoration-none">
                    <i class="bi bi-shield-shaded me-1"></i>Acesso Administrativo
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
