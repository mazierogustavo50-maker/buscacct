version: '3.8'

services:
  web:
    build: .
    container_name: buscacct
    ports:
      - "8000:8000"
    volumes:
      - buscacct_data:/app/data
      - buscacct_convencoes:/app/convencoes
      - buscacct_dados:/app/dados
      - buscacct_media:/app/media
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-change-me-in-production}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-*}
      - DJANGO_CSRF_COOKIE_SECURE=${DJANGO_CSRF_COOKIE_SECURE:-True}
      - DJANGO_SESSION_COOKIE_SECURE=${DJANGO_SESSION_COOKIE_SECURE:-True}
    restart: unless-stopped

volumes:
  buscacct_data:
    driver: local
  buscacct_convencoes:
    driver: local
  buscacct_dados:
    driver: local
  buscacct_media:
    driver: local
